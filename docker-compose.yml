services:
  immich-public-proxy:
    build: .
    image: custom-immich-public-proxy:alpha
    container_name: immich-public-proxy

    restart: unless-stopped
    runtime: gvisor
    read_only: true
    environment:
      PUBLIC_BASE_URL: https://immich.akshaykaundinya.com
      IMMICH_URL: http://172.21.0.5:2283
    healthcheck:
      test: curl -s http://localhost:3000/share/healthcheck -o /dev/null || exit 1
      start_period: 10s
      timeout: 5s
    # volumes:
    #   - ./config.json:/app/config.json
    networks:
      - tunnel_net

networks:
  tunnel_net:
    external: true
